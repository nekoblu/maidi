}

function Home({go,setStep,plan,lang="es",trial,trialActive}){

            <div style={{fontSize:10,color:C.tintaM,marginTop:1}}>{L("desdePrice")}</div>
          </div>
          <div style={{fontSize:13,color:C.jade,fontWeight:700}}>›</div>
        </div>
      ):(
        <div onClick={()=>go("paywall_esencial")} style={{borderRadius:13,padding:"9px 14px",marginBottom:16,cursor:"pointer",

            {lang==="es"?"Plan":lang==="en"?"Plan":lang==="pt"?"Plano":"Forfait"}{" "}<strong style={{color:plan==="plus"?GOLD:C.jade}}>{planName}</strong> · {L("planActivo")}

          <div style={{fontSize:10,color:plan==="plus"?GOLD:C.jade,fontWeight:600}}>{L("gestionar")}</div>

          const locked=q.req&&(q.req==="plus"?plan!=="plus":plan==="free");
          const reqPlanBadge=q.req?PLANES[q.req].badge[lang]||PLANES[q.req].badge.es:"";

              {locked&&<div style={{position:"absolute",top:5,right:5,fontSize:10}}>🔒</div>}
              {q.icon==="q"?<div style={{display:"flex",justifyContent:"center",marginBottom:5}}><QiboFinal size={28}/></div>:<div style={{fontSize:18,marginBottom:5}}>{q.icon}</div>}

      <div style={{fontSize:10,fontWeight:700,color:C.tintaM,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8}}>{L("pacientesRec")}</div>
      {pats.map((p,i)=>(

}

// MOTOR DIAGNÓSTICO MEJORADO — pesos diferenciados, penalización por
// contradicción, bonus por combinaciones características
// ════════════════════════════════════════════════════════════════════════════
function calcularDiagnostico(sel,pac){
  const signals=new Set();
  Object.values(sel).flat().forEach(v=>{if(typeof v==="string")signals.add(v);});

  // Bonus especiales por combinaciones diagnósticamente fuertes
  const COMBOS=[
    {syms:["sudores nocturnos","calor 5 palmos"],bonus:15,ids:["HT_YINXU","KI_YINXU","LV_YINXU","YIN_XU_CALOR_VACIO","HT_KI_DISC"]},
    {syms:["insomnio","palpitaciones","ansiedad"],bonus:12,ids:["HT_YINXU","HT_XIXU","HT_KI_DISC","CORAZON_BAZO_XU"]},
    {syms:["extremidades frías","deposiciones blandas","fatiga"],bonus:12,ids:["SP_YANGXU","KI_YANGXU","YUAN_QI_XU"]},
    {syms:["distensión abdominal","irritabilidad","deposiciones blandas"],bonus:12,ids:["HIGADO_BAZO","LV_QIZHI"]},
    {syms:["lumbalgia","tinnitus","mareos"],bonus:10,ids:["KI_YINXU","KI_YANGXU","KI_JINGXU","LUMBAR_BI"]},
    {syms:["náuseas","inapetencia","distensión abdominal"],bonus:10,ids:["ST_QINIXI","SP_HUMEDAD","HIGADO_BAZO"]},
    {syms:["tos","disnea","fatiga"],bonus:8,ids:["LU_QIXU","LU_YINXU","LU_FLEGMA_FRIO","KI_NO_AGARRA"]},
  ];

  const scores=PATRONES.map(p=>{
    let score=0;let max=0;
    const s=p.senales;
    // Síntomas (peso 3)
    if(s.syms){s.syms.forEach(sy=>{max+=3;if(signals.has(sy))score+=3;});}
    // Pulso (peso 5 — máximo diagnóstico en MTC)
    if(s.pulso){s.pulso.forEach(v=>{max+=5;if(signals.has(v))score+=5;});}
    // Lengua (peso 4)
    if(s.lengua){s.lengua.forEach(v=>{max+=4;if(signals.has(v))score+=4;});}
    // Sudoración (peso 3)
    if(s.sudor){s.sudor.forEach(v=>{max+=3;if(signals.has(v))score+=3;});}
    // Sensación térmica (peso 3)
    if(s.calor){s.calor.forEach(v=>{max+=3;if(signals.has(v))score+=3;});}
    // Cara (peso 1)
    if(s.cara){s.cara.forEach(v=>{max+=1;if(signals.has(v))score+=1;});}
    // Deposiciones (peso 2)
    if(s.deposicion){s.deposicion.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}
    // Respiración (peso 2)
    if(s.respiracion){s.respiracion.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}
    // Orina (peso 2)
    if(s.orina){s.orina.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}

    const base=max>0?Math.round((score/max)*100):0;

    // Aplicar bonus de combos
    let bonus=0;
    COMBOS.forEach(c=>{
      if(c.ids.includes(p.id)){
        const matchCount=c.syms.filter(sy=>signals.has(sy)).length;
        if(matchCount===c.syms.length)bonus=Math.max(bonus,c.bonus);
      }
    });

    const pct=Math.min(99,base+bonus);
    return {...p,pct,score,max};
  });

  return scores.filter(p=>p.pct>0).sort((a,b)=>b.pct-a.pct).slice(0,5);
}

          {[...new Set(hierbasVisible.map(h=>h.cat))].map(c=>(

            </span>

        </div>
        {hierbasVisible.filter(h=>h.cat===hcat).map((h,i)=><Card key={i}>
          <div style={{display:"flex",gap:11}}>
            <div style={{width:38,height:38,borderRadius:10,background:h.color+"18",border:`1px solid ${h.color}33`,

      </>}
    </div>
  </div>;

function ARLocator({go,plan,lang="es"}){
  const L=(k)=>t(k,lang);
  const {useState:uS,useEffect:uE,useRef:uR}=React;
  const [status,setStatus]=uS("idle"); // idle|requesting|active|error|unsupported
  const [selPunto,setSelPunto]=uS("ST36");
  const [detectedPts,setDetectedPts]=uS([]);
  const [overlayMsg,setOverlayMsg]=uS("");
  const [camFacing,setCamFacing]=uS("environment");
  const videoRef=uR(null);
  const canvasRef=uR(null);
  const streamRef=uR(null);
  const animRef=uR(null);

  const punto=AR_PUNTOS[selPunto]||AR_PUNTOS["ST36"];
  const puntosDisp=Object.keys(AR_PUNTOS);

  // Cleanup on unmount
  uE(()=>()=>{
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    if(animRef.current)cancelAnimationFrame(animRef.current);
  },[]);

  async function startCamera(){
    setStatus("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:camFacing,width:{ideal:640},height:{ideal:480}},
        audio:false
      });
      streamRef.current=stream;
      if(videoRef.current){
        videoRef.current.srcObject=stream;
        await videoRef.current.play();
        setStatus("active");
        setOverlayMsg("Apunta la cámara hacia "+punto.zona+". Buscando referencias anatómicas…");
        drawLoop();
      }
    }catch(e){
      setStatus(e.name==="NotAllowedError"?"error":"unsupported");
    }
  }

  function stopCamera(){
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    if(animRef.current)cancelAnimationFrame(animRef.current);
    streamRef.current=null;
    setStatus("idle");
    setDetectedPts([]);
  }

  // Simulación de detección AR (en producción: MediaPipe Pose via CDN)
  // El punto se muestra como overlay guiado sobre el frame de la cámara
  function drawLoop(){
    const canvas=canvasRef.current;
    const video=videoRef.current;
    if(!canvas||!video||!streamRef.current){return;}
    const ctx=canvas.getContext("2d");
    canvas.width=video.videoWidth||320;
    canvas.height=video.videoHeight||240;
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    // Overlay guía con retícula centrada en zona del punto
    const cx=canvas.width/2,cy=canvas.height/2;
    const r=Math.min(canvas.width,canvas.height)*0.18;

    // Retícula principal
    ctx.strokeStyle=punto.color;ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);

    // Cruz central
    ctx.strokeStyle="rgba(255,255,255,0.9)";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-10,cy);ctx.lineTo(cx+10,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-10);ctx.lineTo(cx,cy+10);ctx.stroke();

    // Punto objetivo pulsante
    const pulse=Math.sin(Date.now()/400)*3;
    ctx.fillStyle=punto.color+"CC";
    ctx.beginPath();ctx.arc(cx,cy,8+pulse,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="white";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,8+pulse,0,Math.PI*2);ctx.stroke();

    // Etiqueta del punto
    ctx.fillStyle="rgba(0,0,0,0.65)";
    const lw=ctx.measureText(selPunto).width+20;
    ctx.fillRect(cx-lw/2,cy-r-30,lw,22);
    ctx.fillStyle="white";ctx.font="bold 13px system-ui";ctx.textAlign="center";
    ctx.fillText(selPunto,cx,cy-r-14);

    // Instrucción de búsqueda
    ctx.fillStyle="rgba(0,0,0,0.55)";
    const iw=Math.min(canvas.width-20,300);
    ctx.fillRect(10,canvas.height-46,canvas.width-20,36);
    ctx.fillStyle="white";ctx.font="11px system-ui";ctx.textAlign="left";
    const words=punto.instruccion.split(" ");
    let line="",ly=canvas.height-30;
    words.forEach(w=>{
      const test=line+w+" ";
      if(ctx.measureText(test).width>iw-16&&line!==""){
        ctx.fillText(line,18,ly);line=w+" ";ly+=14;
      }else{line=test;}
    });
    ctx.fillText(line,18,ly);

    animRef.current=requestAnimationFrame(drawLoop);
  }

  if(plan==="free"){
    return(
      <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
        <ABar title="AR · Localización" back={()=>go("home")}/>
        <Locked req="esencial" go={go} plan={plan} setPlan={()=>{}}/>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",background:"#0A0A0A"}}>
      {/* Top bar oscura */}
      <div style={{background:"rgba(10,20,40,0.95)",padding:"10px 14px",flexShrink:0,
        borderBottom:"1px solid rgba(201,168,76,0.2)",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>{stopCamera();go("home");}}
          style={{width:32,height:32,borderRadius:9,border:"1px solid rgba(255,255,255,0.15)",
            background:"rgba(255,255,255,0.08)",color:"white",fontSize:15,cursor:"pointer",flexShrink:0}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:GOLD}}>📍 {L("localizadorAR")}</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:1}}>
            Procesamiento local · Sin envío de datos
          </div>
        </div>
        {status==="active"&&(
          <button onClick={()=>setCamFacing(f=>f==="environment"?"user":"environment")}
            style={{padding:"5px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",
              background:"rgba(255,255,255,0.1)",color:"white",fontSize:10,cursor:"pointer"}}>
            🔄 Cámara
          </button>
        )}
      </div>

      {/* Selector de punto */}
      <div style={{background:"rgba(10,20,40,0.9)",padding:"10px 12px",flexShrink:0,
        borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:6,
          textTransform:"uppercase",letterSpacing:"0.07em"}}>{L("selecPunto")}</div>
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
          {puntosDisp.map(pid=>(
            <button key={pid} onClick={()=>{setSelPunto(pid);if(status==="active")setOverlayMsg("");}}
              style={{flexShrink:0,padding:"5px 10px",borderRadius:8,border:"none",cursor:"pointer",
                fontSize:11,fontWeight:700,
                background:selPunto===pid?AR_PUNTOS[pid].color:"rgba(255,255,255,0.08)",
                color:selPunto===pid?"white":"rgba(255,255,255,0.6)"}}>
              {pid}
            </button>
          ))}
        </div>
      </div>

      {/* Vista de cámara / estados */}
      <div style={{flex:1,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
        {status==="idle"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",padding:24,gap:16}}>
            <div style={{width:80,height:80,borderRadius:22,
              background:`linear-gradient(135deg,${punto.color}44,${punto.color}22)`,
              border:`2px solid ${punto.color}66`,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:36}}>📍</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:GOLD,marginBottom:4}}>{selPunto}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",lineHeight:1.6,marginBottom:4}}>
                {punto.zona} · {punto.ref}
              </div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",lineHeight:1.7,maxWidth:280}}>
                {punto.instruccion}
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"12px 16px",
              border:"1px solid rgba(255,255,255,0.08)",maxWidth:300}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:6,fontWeight:600,
                textTransform:"uppercase",letterSpacing:"0.06em"}}>🔒 Privacidad</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",lineHeight:1.6}}>
                La cámara procesa el video localmente en tu dispositivo.<br/>
                No se envía ni guarda ninguna imagen o dato biométrico.
              </div>
            </div>
            <button onClick={startCamera}
              style={{padding:"14px 36px",borderRadius:14,border:"none",cursor:"pointer",
                background:`linear-gradient(135deg,${punto.color},${punto.color}88)`,
                color:"white",fontSize:14,fontWeight:700,
                boxShadow:`0 4px 20px ${punto.color}44`}}>
              Activar cámara →
            </button>
          </div>
        )}

        {status==="requesting"&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
            flexDirection:"column",gap:12}}>
            <div style={{width:40,height:40,border:`3px solid ${GOLD}33`,
              borderTop:`3px solid ${GOLD}`,borderRadius:"50%",
              animation:"spin 1s linear infinite"}}/>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:13}}>
              {lang==="es"?"Solicitando permiso de cámara…":lang==="en"?"Requesting camera permission…":lang==="pt"?"Solicitando permissão da câmera…":"Demande de permission caméra…"}
            </div>
            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
          </div>
        )}

        {(status==="error"||status==="unsupported")&&(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
            flexDirection:"column",gap:12,padding:24}}>
            <div style={{fontSize:40}}>🚫</div>
            <div style={{color:"white",fontSize:14,fontWeight:600,textAlign:"center"}}>
              {status==="error"?(lang==="es"?"Permiso de cámara denegado":lang==="en"?"Camera permission denied":lang==="pt"?"Permissão de câmera negada":"Permission caméra refusée"):(lang==="es"?"Cámara no disponible":lang==="en"?"Camera not available":lang==="pt"?"Câmera não disponível":"Caméra non disponible")}
            </div>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,textAlign:"center",lineHeight:1.7}}>
              {status==="error"
                ?lang==="es"?"Activa el acceso a la cámara en los ajustes de tu dispositivo.":lang==="en"?"Enable camera access in your device settings.":lang==="pt"?"Ative o acesso à câmera nas configurações do dispositivo.":"Activez l'accès à la caméra dans les paramètres de votre appareil."
                :lang==="es"?"Tu dispositivo o navegador no soporta acceso a la cámara.":lang==="en"?"Your device or browser doesn't support camera access.":lang==="pt"?"Seu dispositivo ou navegador não suporta acesso à câmera.":"Votre appareil ou navigateur ne supporte pas l'accès à la caméra."}
            </div>
            <button onClick={()=>setStatus("idle")}
              style={{padding:"10px 24px",borderRadius:10,border:"1px solid rgba(255,255,255,0.2)",
                background:"rgba(255,255,255,0.08)",color:"white",fontSize:12,cursor:"pointer"}}>
              Volver
            </button>
          </div>
        )}

        {status==="active"&&(
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            <video ref={videoRef} style={{display:"none"}} playsInline muted/>
            <canvas ref={canvasRef}
              style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            {/* Panel inferior de info */}
            <div style={{position:"absolute",bottom:0,left:0,right:0,
              background:"rgba(10,20,40,0.88)",padding:"12px 16px",
              borderTop:"1px solid rgba(201,168,76,0.2)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",
                  background:punto.color,flexShrink:0,
                  boxShadow:`0 0 6px ${punto.color}`}}/>
                <div style={{fontSize:14,fontWeight:700,color:GOLD}}>{selPunto}</div>
                <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,0.5)"}}>
                  {punto.zona} · {punto.ref}
                </div>
                <button onClick={stopCamera}
                  style={{padding:"4px 10px",borderRadius:7,border:"1px solid rgba(255,100,100,0.3)",
                    background:"rgba(255,80,80,0.15)",color:"#FF8080",fontSize:10,cursor:"pointer"}}>
                  ■ Stop
                </button>
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",lineHeight:1.6}}>
                📍 {punto.instruccion}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
function App(){
  const [sc,setSc]=useState("home");
  const [step,setStep]=useState(0);
  const [tab,setTab]=useState(0);
  const [sel,setSel]=useState({});
  const [pac,setPac]=useState({nombre:"",edad:"",sexo:"",motivo:""});
  const [plan,setPlan]=useState("free");
  const [paywallFor,setPaywallFor]=useState("esencial");
  const [lang,setLang]=useState("es"); // es | en | pt | fr
  // trial: {pid, expiresAt (ms timestamp)} — simulación; en producción, servidor valida
  const [trial,setTrial]=useState(null);

  const tog=(k,v,m)=>setSel(p=>{if(m){const a=[...(p[k]||[])];const x=a.indexOf(v);x>=0?a.splice(x,1):a.push(v);return{...p,[k]:a};}return{...p,[k]:p[k]===v?"":v};});

  // Determinar plan efectivo considerando trial activo
  const now=Date.now();
  const trialActive=trial&&trial.expiresAt>now;
  const effectivePlan=trialActive?trial.pid:plan;

  const go=s=>{
    if(s.startsWith("paywall_")){setPaywallFor(s.replace("paywall_",""));setSc("paywall");return;}
    setSc(s);if(s!=="result")setTab(0);
  };

  const startTrial=(pid)=>{
    setTrial({pid,expiresAt:Date.now()+24*60*60*1000}); // 1 día
    setSc("home");
  };

  const needsEsencial=effectivePlan==="free";
  const needsPlus=effectivePlan!=="plus";
  const showNav=sc!=="result"&&sc!=="paywall"&&sc!=="ar"&&sc!=="settings";

  const L=(key)=>t(key,lang); // shorthand

  return <div style={{width:"100%",maxWidth:430,background:C.crema,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 0 60px rgba(37,28,16,0.18)"}}>
    {sc==="home"    && <Home go={go} setStep={setStep} plan={effectivePlan} lang={lang} trial={trial} trialActive={trialActive}/>}
    {sc==="diag"    && (needsEsencial
      ? <Locked req="esencial" go={go} plan={effectivePlan} setPlan={setPlan} lang={lang}/>
      : <Diag go={go} step={step} setStep={setStep} sel={sel} tog={tog} pac={pac} setPac={setPac} lang={lang}/>)}
    {sc==="result"  && <Result go={go} tab={tab} setTab={setTab} sel={sel} pac={pac} lang={lang}/>}
    {sc==="qibo"    && (needsPlus
      ? <Locked req="plus" go={go} plan={effectivePlan} setPlan={setPlan} lang={lang}/>
      : <Qibo lang={lang}/>)}
    {sc==="consult" && <Consult plan={effectivePlan} go={go} lang={lang}/>}
    {sc==="ar"      && <ARLocator go={go} plan={effectivePlan} lang={lang}/>}
    {sc==="paywall" && <Paywall plan={effectivePlan} setPlan={setPlan} back={()=>setSc("home")} upgrade={paywallFor} lang={lang} startTrial={startTrial} trial={trial}/>}
    {sc==="settings"&& <Settings plan={effectivePlan} lang={lang} setLang={setLang} go={go} trial={trial} trialActive={trialActive}/>}
    {showNav && <NavBar sc={sc} go={go} lang={lang}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
