  MAIDI SECURITY ARCHITECTURE v1.0
  ══════════════════════════════════════════════════════════════
  Capa 1 — Client (este archivo):
    · Bundle minificado + Terser obfuscation en producción
    · Variable renaming aleatorio (a,b,c → k8z, p3x, …)
    · String encoding (Base64 + XOR) para datos clínicos
    · Dead code injection para confusión de análisis estático
    · Self-integrity check: hash SHA-256 del bundle en runtime

  Capa 2 — API Gateway (producción):
    · Motor diagnóstico crítico reside en servidor Node/Python
    · El cliente solo envía señales codificadas, recibe tokens
    · JWT con expiración corta + refresh ligado a plan activo
    · Rate limiting por device fingerprint
    · Validación de suscripción en cada llamada diagnóstica

  Capa 3 — Store:
    · iOS: App Attest + DeviceCheck para verificar cliente legítimo
    · Android: Play Integrity API
    · Ambos: certificate pinning en llamadas API

  Capa 4 — Legal:
    · Copyright © Maidi MTC Clínica — Todos los derechos reservados
    · Marca registrada pendiente de tramitación
    · Contenido clínico protegido como base de datos sui generis (Directiva 96/9/CE)
    · Los datos de localización de puntos y patrones diagnósticos constituyen
      obra original de compilación protegida por derechos de autor
  ══════════════════════════════════════════════════════════════
-->

// MOTOR DIAGNÓSTICO MEJORADO — pesos diferenciados, penalización por
// contradicción, bonus por combinaciones características

function calcularDiagnostico(sel,pac){
  const signals=new Set();
  Object.values(sel).flat().forEach(v=>{if(typeof v==="string")signals.add(v);});

  // Bonus especiales por combinaciones diagnósticamente fuertes
  const COMBOS=[
    {syms:["sudores nocturnos","calor 5 palmos"],bonus:15,ids:["HT_YINXU","KI_YINXU","LV_YINXU","YIN_XU_CALOR_VACIO","HT_KI_DISC"]},
    {syms:["insomnio","palpitaciones","ansiedad"],bonus:12,ids:["HT_YINXU","HT_XIXU","HT_KI_DISC","CORAZON_BAZO_XU"]},
    {syms:["extremidades frías","deposiciones blandas","fatiga"],bonus:12,ids:["SP_YANGXU","KI_YANGXU","YUAN_QI_XU"]},
    {syms:["distensión abdominal","irritabilidad","deposiciones blandas"],bonus:12,ids:["HIGADO_BAZO","LV_QIZHI"]},
    {syms:["lumbalgia","tinnitus","mareos"],bonus:10,ids:["KI_YINXU","KI_YANGXU","KI_JINGXU","LUMBAR_BI"]},
    {syms:["náuseas","inapetencia","distensión abdominal"],bonus:10,ids:["ST_QINIXI","SP_HUMEDAD","HIGADO_BAZO"]},
    {syms:["tos","disnea","fatiga"],bonus:8,ids:["LU_QIXU","LU_YINXU","LU_FLEGMA_FRIO","KI_NO_AGARRA"]},
  ];

  const scores=PATRONES.map(p=>{
    let score=0;let max=0;
    const s=p.senales;
    // Síntomas (peso 3)
    if(s.syms){s.syms.forEach(sy=>{max+=3;if(signals.has(sy))score+=3;});}
    // Pulso (peso 5 — máximo diagnóstico en MTC)
    if(s.pulso){s.pulso.forEach(v=>{max+=5;if(signals.has(v))score+=5;});}
    // Lengua (peso 4)
    if(s.lengua){s.lengua.forEach(v=>{max+=4;if(signals.has(v))score+=4;});}
    // Sudoración (peso 3)
    if(s.sudor){s.sudor.forEach(v=>{max+=3;if(signals.has(v))score+=3;});}
    // Sensación térmica (peso 3)
    if(s.calor){s.calor.forEach(v=>{max+=3;if(signals.has(v))score+=3;});}
    // Cara (peso 1)
    if(s.cara){s.cara.forEach(v=>{max+=1;if(signals.has(v))score+=1;});}
    // Deposiciones (peso 2)
    if(s.deposicion){s.deposicion.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}
    // Respiración (peso 2)
    if(s.respiracion){s.respiracion.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}
    // Orina (peso 2)
    if(s.orina){s.orina.forEach(v=>{max+=2;if(signals.has(v))score+=2;});}

    const base=max>0?Math.round((score/max)*100):0;

    // Aplicar bonus de combos
    let bonus=0;
    COMBOS.forEach(c=>{
      if(c.ids.includes(p.id)){
        const matchCount=c.syms.filter(sy=>signals.has(sy)).length;
        if(matchCount===c.syms.length)bonus=Math.max(bonus,c.bonus);
      }
    });

    const pct=Math.min(99,base+bonus);
    return {...p,pct,score,max};
  });

  return scores.filter(p=>p.pct>0).sort((a,b)=>b.pct-a.pct).slice(0,5);
}

function App(){
  const [sc,setSc]=useState("home");
  const [step,setStep]=useState(0);
  const [tab,setTab]=useState(0);
  const [sel,setSel]=useState({});
  const [pac,setPac]=useState({nombre:"",edad:"",sexo:"",motivo:""});
  const [plan,setPlan]=useState(()=>{try{const v=localStorage.getItem("maidi_plan");if(v&&["free","esencial","plus"].includes(v))return v;}catch(e){}return "free";});
  const setPlanPersist=(p)=>{setPlan(p);try{localStorage.setItem("maidi_plan",p);}catch(e){}};
  const [paywallFor,setPaywallFor]=useState("esencial");
  const [lang,setLang]=useState("es"); // es | en | pt | fr
  // trial: {pid, expiresAt (ms timestamp)} — simulación; en producción, servidor valida
  const [trial,setTrial]=useState(()=>{try{const v=localStorage.getItem("maidi_trial");if(v){const p=JSON.parse(v);if(p.expiresAt>Date.now())return p;}}catch(e){}return null;});
  const setTrialPersist=(t)=>{setTrial(t);try{if(t)localStorage.setItem("maidi_trial",JSON.stringify(t));else localStorage.removeItem("maidi_trial");}catch(e){}};

  const tog=(k,v,m)=>setSel(p=>{if(m){const a=[...(p[k]||[])];const x=a.indexOf(v);x>=0?a.splice(x,1):a.push(v);return{...p,[k]:a};}return{...p,[k]:p[k]===v?"":v};});

  // Determinar plan efectivo considerando trial activo
  const now=Date.now();
  const trialActive=trial&&trial.expiresAt>now;
  const effectivePlan=trialActive?trial.pid:plan;

  const go=s=>{
    if(s.startsWith("paywall_")){setPaywallFor(s.replace("paywall_",""));setSc("paywall");return;}
    setSc(s);if(s!=="result")setTab(0);
  };

  const startTrial=async(pid)=>{
    try{const result=await window.__maidiLaunchBilling(pid);setTrialPersist({pid:result.plan,expiresAt:result.expiresAt});setPlanPersist(result.plan);}
    catch(err){if(err&&err.code!=="USER_CANCELLED"){console.error("[Maidi] Billing error:",err);}}
    setSc("home");
  };

  const needsEsencial=effectivePlan==="free";
  const needsPlus=effectivePlan!=="plus";
  const showNav=sc!=="result"&&sc!=="paywall"&&sc!=="ar"&&sc!=="settings";

  const L=(key)=>t(key,lang); // shorthand

  return React.createElement('div', { style: {width:"100%",maxWidth:430,background:C.crema,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 0 60px rgba(37,28,16,0.18)"},}
    , sc==="home"    && React.createElement(Home, { go: go, setStep: setStep, plan: effectivePlan, lang: lang, trial: trial, trialActive: trialActive,})
    , sc==="diag"    && (needsEsencial
      ? React.createElement(Locked, { req: "esencial", go: go, plan: effectivePlan, setPlan: setPlanPersist, lang: lang,})
      : React.createElement(Diag, { go: go, step: step, setStep: setStep, sel: sel, tog: tog, pac: pac, setPac: setPac, lang: lang,}))
    , sc==="result"  && React.createElement(Result, { go: go, tab: tab, setTab: setTab, sel: sel, pac: pac, lang: lang,})
    , sc==="qibo"    && (needsPlus
      ? React.createElement(Locked, { req: "plus", go: go, plan: effectivePlan, setPlan: setPlanPersist, lang: lang,})
      : React.createElement(Qibo, { lang: lang,}))
    , (sc==="consult"||sc==="atlas"||sc==="reloj") && React.createElement(Consult, { key: sc, plan: effectivePlan, go: go, lang: lang, initialTab: sc==="atlas"?4:sc==="reloj"?7:0,})
    , sc==="ar"      && React.createElement(ARLocator, { go: go, plan: effectivePlan, lang: lang,})
    , sc==="paywall" && React.createElement(Paywall, { plan: effectivePlan, setPlan: setPlanPersist, back: ()=>setSc("home"), upgrade: paywallFor, lang: lang, startTrial: startTrial, trial: trial,})
    , sc==="settings"&& React.createElement(Settings, { plan: effectivePlan, lang: lang, setLang: setLang, go: go, trial: trial, trialActive: trialActive,})
    , showNav && React.createElement(NavBar, { sc: sc, go: go, lang: lang,})
  );
}

window.__maidiBillingResolve=null;window.__maidiBillingReject=null;
window.MaidiBridge_onPurchase=function(r){if(window.__maidiBillingResolve){window.__maidiBillingResolve(r);window.__maidiBillingResolve=null;window.__maidiBillingReject=null;}};

window.__maidiLaunchBilling=function(pid){
  var sku={esencial:"maidi_esencial",plus:"maidi_plus"}[pid]||("maidi_"+pid);
  return new Promise(function(resolve,reject){
    window.__maidiBillingResolve=resolve;window.__maidiBillingReject=reject;
    if(window.MaidiBridge&&typeof window.MaidiBridge.launchBilling==="function"){window.MaidiBridge.launchBilling(sku);}
    else{setTimeout(function(){resolve({plan:pid,token:"TEST",expiresAt:Date.now()+30*24*60*60*1000});},1500);}
  });
};
